name: Update Models and Generate SDKs

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'Cargo.toml'

jobs:
  update-and-generate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout main branch
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache cargo dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build the project
      run: cargo build --release
    
    - name: Fetch latest models data
      run: ./target/release/llmmeta fetch --output models.json
    
    - name: Generate Rust SDK
      run: |
        mkdir -p sdks/rust
        ./target/release/llmmeta generate --input models.json --lang rust --output sdks/rust
    
    - name: Generate Dart SDK  
      run: |
        mkdir -p sdks/dart
        ./target/release/llmmeta generate --input models.json --lang dart --output sdks/dart
    
    - name: Generate Go SDK
      run: |
        mkdir -p sdks/go
        ./target/release/llmmeta generate --input models.json --lang go --output sdks/go
    
    - name: Generate Python SDK
      run: |
        mkdir -p sdks/python
        ./target/release/llmmeta generate --input models.json --lang python --output sdks/python
    
    - name: Generate TypeScript SDK
      run: |
        mkdir -p sdks/typescript
        ./target/release/llmmeta generate --input models.json --lang typescript --output sdks/typescript
    
    - name: Check if generated files changed
      id: check_changes
      run: |
        if [ -n "$(git status --porcelain -- models.json sdks)" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Commit models and SDKs to main
      if: steps.check_changes.outputs.changed == 'true'
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git add models.json sdks
        git commit -m "update: latest models data and SDKs $(date -I)"
        git push origin main
    
    - name: Create Release
      if: steps.check_changes.outputs.changed == 'true'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Models Update ${{ github.run_number }}
        body: |
          Automated update of LLM models data from models.dev
          
          Changes:
          - Updated models.json with latest data
          - Generated fresh SDKs for all supported languages under sdks/
          
          SDK Paths:
          - sdks/rust
          - sdks/dart
          - sdks/go
          - sdks/python
          - sdks/typescript
        draft: false
        prerelease: false
